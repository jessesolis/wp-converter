services:
  postgres:
    image: postgres:16
    container_name: scorpion-wp-converter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scorpion
      POSTGRES_PASSWORD: scorpion
      POSTGRES_DB: scorpion_wp_converter
    ports:
      - "5432:5432"
    volumes:
      - scorpion_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorpion -d scorpion_wp_converter"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: scorpion-wp-converter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - scorpion_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Local WordPress, for importing generated zips and comparing the result
  # ---- against the live Scorpion site. Run `docker compose up -d wpdb wordpress`
  # ---- then `npm run wp:import` from backend/.
  wpdb:
    image: mariadb:11
    container_name: scorpion-wp-converter-wpdb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: wp
      MARIADB_USER: wp
      MARIADB_PASSWORD: wp
      MARIADB_ROOT_PASSWORD: wproot
    volumes:
      - scorpion_wp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s
      timeout: 3s
      retries: 30

  wordpress:
    image: wordpress:6.7-php8.3-apache
    container_name: scorpion-wp-converter-wp
    restart: unless-stopped
    depends_on:
      wpdb:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: wpdb:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wp
      WORDPRESS_DEBUG: "1"
    ports:
      - "8080:80"
    volumes:
      - scorpion_wp_data:/var/www/html

  wpcli:
    image: wordpress:cli-php8.3
    container_name: scorpion-wp-converter-wpcli
    depends_on:
      wpdb:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: wpdb:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wp
    volumes:
      - scorpion_wp_data:/var/www/html
    # Only spun up on demand via `docker compose run --rm wpcli …`.
    profiles:
      - tools

  # ---- App services. Run `docker compose up -d` to start everything.
  # ---- Source is bind-mounted for hot reload; node_modules is preserved
  # ---- in a named volume so the host's lock isn't fought over.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: scorpion-wp-converter-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://scorpion:scorpion@postgres:5432/scorpion_wp_converter
      REDIS_URL: redis://redis:6379
      TEMP_DIR: /tmp/scorpion-conversions
      # tsx/chokidar over a bind mount on Windows needs polling.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      # Conversion output is bind-mounted to the host's ./.conversions/
      # so `npm run wp:import` (run on the host) can still see the zips.
      - ./.conversions:/tmp/scorpion-conversions

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: scorpion-wp-converter-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # SSR-time proxy target inside the compose network.
      BACKEND_URL: http://backend:3001
      # Browser-time WS endpoint — must be reachable from the host.
      NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:3001
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  scorpion_pg_data:
  scorpion_redis_data:
  scorpion_wp_data:
  scorpion_wp_db_data:
  backend_node_modules:
  frontend_node_modules:
